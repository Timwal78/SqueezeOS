<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SqueezeOS V2 - Institutional Master Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background: #0a0a0a; color: #d0d0d0; }
        .up { color: #22ee22; }
        .down { color: #ff3b3b; }
        .amber { color: #ff8c00; }
        .panel { background: #141414; border: 1px solid #2a2a2a; }
        .panel-header { background: #1a1a1a; border-bottom: 1px solid #2a2a2a; color: #ff8c00; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; padding: 4px 8px; }
        .num { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="h-screen flex flex-col p-2 gap-2 overflow-hidden">
    <!-- MASTER BANNER -->
    <div id="banner" class="panel border-2 border-orange-500 shadow-[0_0_15px_rgba(255,140,0,0.2)] p-4 flex justify-between items-center">
        <div>
            <div class="text-[10px] text-orange-500 uppercase tracking-[0.4em] font-bold">Master Verdict</div>
            <div id="decision" class="text-5xl font-black italic tracking-tighter up">LOADING...</div>
        </div>
        <div class="flex gap-8 items-center">
            <div class="text-center">
                <div class="text-[10px] text-gray-500 uppercase tracking-widest">Grade</div>
                <div id="grade" class="text-4xl font-black text-orange-500">--</div>
            </div>
            <div class="h-12 w-px bg-gray-800"></div>
            <div class="text-center">
                <div class="text-[10px] text-gray-500 uppercase tracking-widest">Edge</div>
                <div id="edge" class="text-4xl font-black up">--</div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-2 flex-1 min-h-0">
        <!-- AGENT COUNCIL -->
        <div class="panel flex flex-col">
            <div class="panel-header">Council of Agents</div>
            <div id="agents" class="p-2 space-y-2 overflow-auto">
                <!-- Agents here -->
            </div>
        </div>

        <!-- TELEMETRY -->
        <div class="panel flex flex-col">
            <div class="panel-header">Real-Time Telemetry</div>
            <div class="p-2 overflow-auto">
                <table class="w-full text-xs">
                    <thead class="text-[10px] uppercase text-gray-500 border-b border-gray-800">
                        <tr>
                            <th class="text-left py-1">Ticker</th>
                            <th class="text-right py-1">Price</th>
                            <th class="text-right py-1">Apex</th>
                            <th class="text-right py-1">Put Wall</th>
                            <th class="text-right py-1">Call Wall</th>
                            <th class="text-right py-1">GEX</th>
                        </tr>
                    </thead>
                    <tbody id="tickers">
                        <!-- Tickers here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="h-6 flex justify-between items-center px-2 bg-[#1a1a1a] text-[9px] uppercase tracking-widest text-gray-500 border-t border-gray-800">
        <div>System: ONLINE | Node: SML-V2-BRIDGE</div>
        <div id="clock">--:--:--</div>
    </div>

    <script>
        async function update() {
            try {
                const res = await fetch('http://localhost:8182/api/terminal');
                const data = await res.json();
                
                document.getElementById('decision').innerText = data.master_decision;
                document.getElementById('decision').className = 'text-5xl font-black italic tracking-tighter ' + (data.master_decision.includes('LONG') ? 'up' : 'down');
                document.getElementById('grade').innerText = data.master_grade;
                document.getElementById('edge').innerText = '+' + data.war_room_score.edge;

                const agentsHtml = data.agents.map(a => `
                    <div class="p-2 bg-[#1a1a1a] border border-[#2a2a2a] rounded">
                        <div class="flex justify-between text-[10px] mb-1">
                            <span class="text-orange-500 font-bold">${a.name}</span>
                            <span class="text-green-500">${a.status}</span>
                        </div>
                        <div class="text-[11px] italic text-gray-300">"${a.last_thought}"</div>
                    </div>
                `).join('');
                document.getElementById('agents').innerHTML = agentsHtml;

                const tickersHtml = Object.entries(data.tickers).map(([sym, t]) => `
                    <tr class="border-b border-[#1f1f1f]">
                        <td class="text-orange-500 font-bold py-1">${sym}</td>
                        <td class="text-right num">${t.price.toFixed(2)}</td>
                        <td class="text-right num up font-bold">+${t.apex}</td>
                        <td class="text-right num down">${t.put_wall.toFixed(2)}</td>
                        <td class="text-right num up">${t.call_wall.toFixed(2)}</td>
                        <td class="text-right num text-cyan-400">${(t.gex/1e6).toFixed(1)}M</td>
                    </tr>
                `).join('');
                document.getElementById('tickers').innerHTML = tickersHtml;

            } catch (e) {
                document.getElementById('decision').innerText = 'API OFFLINE';
                document.getElementById('decision').className = 'text-5xl font-black italic tracking-tighter down';
            }
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }

        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
