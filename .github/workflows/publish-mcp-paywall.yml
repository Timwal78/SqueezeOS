name: Publish mcp-paywall

on:
  push:
    tags:
      - "mcp-paywall/v*.*.*"

jobs:
  publish:
    name: Build, Test & Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: relay/node_modules
          key: node-${{ hashFiles('relay/mcp-paywall/package-lock.json') }}
          restore-keys: |
            node-

      - name: Install dependencies
        run: npm ci
        working-directory: relay

      - name: Build
        run: npm --prefix relay/mcp-paywall run build

      - name: Test
        run: npm --prefix relay/mcp-paywall run test

      - name: Set up npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > relay/mcp-paywall/.npmrc

      - name: Publish to npm
        run: npm publish --access public
        working-directory: relay/mcp-paywall
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#mcp-paywall/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace('mcp-paywall/', '');
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `mcp-paywall ${version}`,
              body: `## @relayos/mcp-paywall ${version}\n\nSee [CHANGELOG](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/relay/mcp-paywall/CHANGELOG.md) for details.\n\n**Install:**\n\`\`\`\nnpm install @relayos/mcp-paywall@${version}\n\`\`\``,
              generate_release_notes: true,
            });
