name: xdeo-ci

on:
  push:
    branches: ["**"]
    paths: ["xdeo/**"]
  pull_request:
    paths: ["xdeo/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xdeo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: xdeo/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
