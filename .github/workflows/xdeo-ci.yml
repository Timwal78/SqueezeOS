name: xdeo-ci

on:
  push:
    branches: ["**"]
    paths: ["xdeo/**"]
  pull_request:
    paths: ["xdeo/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xdeo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Node >= 22.5 is required for the built-in node:sqlite module used by
          # the DB integration tests (test/helpers/d1.ts).
          node-version: "22"
          cache: npm
          cache-dependency-path: xdeo/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
