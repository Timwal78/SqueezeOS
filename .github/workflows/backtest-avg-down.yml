name: Backtest CASCADE ACCUMULATOR (avg_down_engine) vs. baselines

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated equity symbols to test"
        required: true
        default: "SPY,QQQ,AAPL,MSFT,NVDA,TSLA,AMD,META"
      days:
        description: "Lookback window in calendar days"
        required: true
        default: "1095"

jobs:
  backtest:
    name: Run real backtest against Tradier historical data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run backtest
        env:
          TRADIER_API_KEY: ${{ secrets.TRADIER_API_KEY }}
          # The real TRADIER_API_KEY here is a production brokerage key (the
          # same one squeezeos-api uses live) — Tradier's sandbox host
          # rejects production keys with a 401, which is exactly what
          # happened when this was left unset (defaults to sandbox).
          TRADIER_ENV: production
        run: |
          python tools/backtest_avg_down.py \
            --symbols "${{ github.event.inputs.symbols }}" \
            --days "${{ github.event.inputs.days }}" \
            --out backtest_results.json
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: avg-down-backtest-results
          path: backtest_results.json
