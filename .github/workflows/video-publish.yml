name: SML Signal Video — Auto Generate & Publish

on:
  schedule:
    - cron: '30 12 * * 1-5'  # 08:30 ET weekdays — pre-market (IWM)
    - cron: '0  17 * * 1-5'  # 13:00 ET weekdays — midday      (SPY)
    - cron: '0  20 * * 1-5'  # 16:00 ET weekdays — close       (QQQ)
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Ticker symbol'
        required: false
        default: 'IWM'

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install system deps (ffmpeg)
        run: sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r video/requirements.txt

      - name: Resolve symbol from schedule
        id: sym
        run: |
          if [ -n "${{ github.event.inputs.symbol }}" ]; then
            echo "symbol=${{ github.event.inputs.symbol }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if   [ "$HOUR" -eq 12 ]; then echo "symbol=IWM" >> $GITHUB_OUTPUT   # 08:30 ET pre-market
            elif [ "$HOUR" -eq 17 ]; then echo "symbol=SPY" >> $GITHUB_OUTPUT   # 13:00 ET midday
            else                          echo "symbol=QQQ" >> $GITHUB_OUTPUT   # 16:00 ET close
            fi
          fi

      - name: Generate signal video
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          SQUEEZEOS_BASE_URL:  https://squeezeos-api.onrender.com
          VIDEO_SYMBOL:        ${{ steps.sym.outputs.symbol }}
          VIDEO_OUTPUT_PATH:   /tmp/sml_signal_video.mp4
          TTS_VOICE:           onyx
        run: python video/generate_signal_video.py

      - name: Publish to YouTube + Discord + Farcaster
        env:
          VIDEO_OUTPUT_PATH:      /tmp/sml_signal_video.mp4
          VIDEO_SYMBOL:           ${{ steps.sym.outputs.symbol }}
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          DISCORD_WEBHOOK_VIDEO:  ${{ secrets.DISCORD_WEBHOOK_VIDEO }}
          DISCORD_WEBHOOK_ALL:    ${{ secrets.DISCORD_WEBHOOK_ALL }}
          NEYNAR_API_KEY:         ${{ secrets.NEYNAR_API_KEY }}
          NEYNAR_BOT_SIGNER_UUID: ${{ secrets.NEYNAR_BOT_SIGNER_UUID }}
        run: python video/publish.py

      - name: Upload video as artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sml-signal-video-${{ github.run_id }}
          path: /tmp/sml_signal_video.mp4
          retention-days: 7
