name: CI — 402proof

on:
  push:
    paths:
      - "402proof/**"
  pull_request:
    paths:
      - "402proof/**"

jobs:
  build:
    name: Go build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: 402proof/go.sum

      - name: Build
        run: go build ./...
        working-directory: 402proof

  test:
    name: Go test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: 402proof/go.sum

      - name: Test
        run: go test ./...
        working-directory: 402proof
