name: SML SEO Business Orchestrator

on:
  schedule:
    # Daily at 09:00 ET (14:00 UTC) — after market open, before midday lull
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
      keywords:
        description: 'Override target keywords (comma-separated)'
        required: false

jobs:
  run-seo-orchestrator:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run SEO Orchestrator
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          SQUEEZEOS_BASE_URL:  https://squeezeos-api.onrender.com
          SEO_SLACK_WEBHOOK:   ${{ secrets.SEO_SLACK_WEBHOOK }}
          SEO_TARGET_KEYWORDS: ${{ inputs.keywords || 'AI SEO agent OS,autonomous trading intelligence,x402 payment protocol,MCP server trading,institutional market signals,squeeze momentum scanner' }}
          SEO_OUTPUT_DIR:      agent/outputs
          RUN_ONCE:            "true"
        run: python agent/seo_orchestrator.py

      - name: Upload daily briefing
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-briefing-${{ github.run_id }}-${{ github.run_attempt }}
          path: agent/outputs/
          retention-days: 90
