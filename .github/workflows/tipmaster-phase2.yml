name: TipMaster Phase 2 — Configure & Deploy (DELETE AFTER USE)

# Run AFTER tapping the approval URL from Phase 1 in Warpcast.

on:
  workflow_dispatch:
    inputs:
      signer_uuid:
        description: 'Signer UUID from Phase 1 Summary tab'
        required: true
      treasury_address:
        description: 'XRPL cold/treasury wallet address (optional)'
        required: false
        default: ''

jobs:
  configure:
    name: Configure TipMaster end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NK: '5E46E636-CC5C-4D02-AF62-042269DEC9B8'
      RK: 'rnd_HwBcJWniVQM1oJI4R310AZeFqahJ'

    steps:
      - name: Mask secrets
        run: |
          echo "::add-mask::$NK"
          echo "::add-mask::$RK"
          echo "::add-mask::${{ github.event.inputs.signer_uuid }}"

      - name: Generate XRPL gateway wallet
        id: xrpl
        run: |
          pip install xrpl-py -q 2>&1 | grep -E "Successfully|already" || true
          WALLET=$(python3 -c "from xrpl.wallet import Wallet; w=Wallet.create(); print(w.seed+'|'+w.classic_address)")
          SEED="${WALLET%%|*}"
          ADDR="${WALLET##*|}"
          echo "::add-mask::$SEED"
          echo "seed=$SEED" >> "$GITHUB_OUTPUT"
          echo "address=$ADDR" >> "$GITHUB_OUTPUT"
          echo "XRPL gateway wallet: $ADDR"

      - name: Poll until signer approved (every 20s, up to 15 min)
        id: poll
        run: |
          SIGNER_UUID="${{ github.event.inputs.signer_uuid }}"
          FID=""
          echo "Polling Neynar for signer approval..."
          for i in $(seq 1 45); do
            RESP=$(curl -s "https://api.neynar.com/v2/farcaster/signer?signer_uuid=$SIGNER_UUID" -H "x-api-key: $NK")
            STATUS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','error'))" 2>/dev/null)
            FID=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('fid') or '')" 2>/dev/null)
            echo "[$i/45] status=$STATUS"
            if [ "$STATUS" = "approved" ] && [ -n "$FID" ]; then
              echo "::add-mask::$FID"
              echo "fid=$FID" >> "$GITHUB_OUTPUT"
              echo "Approved! Bot FID: $FID"
              break
            fi
            FID=""
            sleep 20
          done
          if [ -z "$FID" ]; then
            echo "TIMEOUT: signer not approved. Tap the Phase 1 approval URL in Warpcast, then re-run."
            exit 1
          fi

      - name: Create Neynar webhook
        id: webhook
        run: |
          BOT_FID="${{ steps.poll.outputs.fid }}"
          RESP=$(curl -s -X POST "https://api.neynar.com/v2/farcaster/webhook" \
            -H "x-api-key: $NK" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"tipmaster\",\"url\":\"https://tipmaster.onrender.com/webhook/cast\",\"subscription\":{\"cast.created\":{\"mentioned_fids\":[$BOT_FID]}}}")
          echo "Webhook response: $RESP"
          SECRET=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); wh=d.get('webhook',d); print(wh.get('secret',''))")
          echo "::add-mask::$SECRET"
          echo "secret=$SECRET" >> "$GITHUB_OUTPUT"
          echo "Webhook created"

      - name: Find Render tipmaster service
        id: svc
        run: |
          RESP=$(curl -s "https://api.render.com/v1/services?limit=20" -H "Authorization: Bearer $RK")
          SVC_ID=$(echo "$RESP" | python3 -c "import sys,json; r=[i.get('service',i)['id'] for i in json.load(sys.stdin) if i.get('service',i).get('name','').lower()=='tipmaster']; print(r[0] if r else '')")
          if [ -z "$SVC_ID" ]; then
            echo "ERROR: tipmaster not found in Render. Full response:"
            echo "$RESP"
            exit 1
          fi
          echo "service_id=$SVC_ID" >> "$GITHUB_OUTPUT"
          echo "Render service: $SVC_ID"

      - name: Set all Render env vars
        env:
          SVC_ID:         ${{ steps.svc.outputs.service_id }}
          WEBHOOK_SECRET: ${{ steps.webhook.outputs.secret }}
          SIGNER_UUID:    ${{ github.event.inputs.signer_uuid }}
          BOT_FID:        ${{ steps.poll.outputs.fid }}
          XRPL_SEED:      ${{ steps.xrpl.outputs.seed }}
          XRPL_ADDR:      ${{ steps.xrpl.outputs.address }}
          TREASURY:       ${{ github.event.inputs.treasury_address }}
          PY: |
            import json, subprocess, os
            svc = os.environ["SVC_ID"]
            env_vars = [
                {"key": "NEYNAR_API_KEY",             "value": os.environ["NK"]},
                {"key": "NEYNAR_WEBHOOK_SECRET",      "value": os.environ["WEBHOOK_SECRET"]},
                {"key": "NEYNAR_BOT_SIGNER_UUID",     "value": os.environ["SIGNER_UUID"]},
                {"key": "TIPMASTER_BOT_FID",          "value": str(os.environ["BOT_FID"])},
                {"key": "TIPMASTER_XRPL_SEED",        "value": os.environ["XRPL_SEED"]},
                {"key": "TIPMASTER_XRPL_ADDRESS",     "value": os.environ["XRPL_ADDR"]},
                {"key": "TIPMASTER_TREASURY_ADDRESS", "value": os.environ.get("TREASURY","")},
            ]
            r = subprocess.run(["curl","-s","-X","PUT",
                f"https://api.render.com/v1/services/{svc}/env-vars",
                "-H", f"Authorization: Bearer {os.environ['RK']}",
                "-H","Content-Type: application/json",
                "-d", json.dumps(env_vars)],
                capture_output=True, text=True)
            try:
                resp = json.loads(r.stdout)
                print(f"Env vars set: {len(resp) if isinstance(resp,list) else '?'}")
            except Exception:
                print("Response:", r.stdout[:300])
        run: python3 -c "$PY"

      - name: Trigger Render redeploy
        run: |
          SVC="${{ steps.svc.outputs.service_id }}"
          curl -s -X POST "https://api.render.com/v1/services/$SVC/deploys" \
            -H "Authorization: Bearer $RK" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}'
          echo "Redeploy triggered!"

      - name: Done
        run: |
          echo "TipMaster is LIVE — https://tipmaster.onrender.com"
          echo "Bot FID: ${{ steps.poll.outputs.fid }}"
          echo "Gateway wallet: ${{ steps.xrpl.outputs.address }}"
          echo "Fund the gateway wallet with RLUSD to enable tipping."
