name: Submit CLIs to printing-press-library

on:
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run registry submission script
        env:
          GH_TOKEN: ${{ secrets.CLI_PUSH_TOKEN }}
        run: bash cli/submit-to-registry.sh
