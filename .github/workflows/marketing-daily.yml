name: SML Marketing Department — Daily Campaign Run

# Runs the real CEO (campaign_director.run_all_agents) once a day. The CEO
# dispatches work to Directory Ranger, Community Scout, and Federal Scout
# in-process, verifies each one actually produced real output, reports every
# real result (success or failure) to the public activity feed as it happens,
# then synthesizes an executive report and delivers it to Slack.
#
# Previously this ran weekly across 4 separate parallel jobs with a duplicate
# inline synthesis script that didn't call the real orchestrator code at all.
# That's gone — this workflow now calls the actual, tested campaign_director
# module directly, so what runs here is exactly what's version-controlled
# and reviewed, not a second copy of the logic.

on:
  schedule:
    # Daily 08:00 ET (12:00 UTC) — offset from the AEO self-ad loop's 06:00 ET
    # run so the two don't compete for Render cold-start / API rate limits.
    - cron: '0 12 * * *'
  workflow_dispatch: {}

jobs:
  ceo-run:
    name: CEO — dispatch and verify all marketing agents
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - run: pip install anthropic requests

      - name: Run CEO (Campaign Director)
        env:
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          SQUEEZEOS_BASE_URL:        https://squeezeos-api.onrender.com
          MCP_X402_BASE_URL:         https://mcp-x402.onrender.com
          X402_PAYMENT_TOKEN:        ${{ secrets.X402_PAYMENT_TOKEN }}
          SEO_SLACK_WEBHOOK:         ${{ secrets.SEO_SLACK_WEBHOOK }}
          SEO_OUTPUT_DIR:            agent/outputs
          DEPT_MODEL:                claude-opus-4-8
          MARKETING_ACTIVITY_SECRET: ${{ secrets.MARKETING_ACTIVITY_SECRET }}
        run: python -c "from agent.dept import campaign_director; campaign_director.run()"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: campaign-report-${{ github.run_id }}
          path: agent/outputs/
          retention-days: 90
