name: SML Autonomous Agent (XRPL)

on:
  schedule:
    - cron: '45 12 * * 1-5'
    - cron: '35 13 * * 1-5'
    - cron: '0 16 * * 1-5'
    - cron: '0 19 * * 1-5'
    - cron: '15 20 * * 1-5'

  workflow_dispatch:

jobs:
  execute-autonomous-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests anthropic xrpl-py apscheduler
          
      - name: Run SML Agent
        env:
          AGENT_XRPL_SEED: ${{ secrets.AGENT_XRPL_SEED }}
          AGENT_XRPL_ADDRESS: ${{ secrets.AGENT_XRPL_ADDRESS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_ONCE: "true"
        run: python agent/sml_agent.py
