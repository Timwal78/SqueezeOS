name: SML Autonomous Agent (XRPL)

on:
  schedule:
    # Schedule uses UTC time. Eastern Time is UTC-4 (or UTC-5 depending on daylight saving).
    # Assuming EDT (UTC-4):
    # 08:45 ET = 12:45 UTC
    # 09:35 ET = 13:35 UTC
    # 12:00 ET = 16:00 UTC
    # 15:00 ET = 19:00 UTC
    # 16:15 ET = 20:15 UTC
    - cron: '45 12 * * 1-5'
    - cron: '35 13 * * 1-5'
    - cron: '0 16 * * 1-5'
    - cron: '0 19 * * 1-5'
    - cron: '15 20 * * 1-5'

  workflow_dispatch:
    # Allows manual triggering

jobs:
  execute-autonomous-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests anthropic xrpl-py apscheduler
          
      - name: Run SML Agent
        env:
          AGENT_XRPL_SEED: ${{ secrets.AGENT_XRPL_SEED }}
          AGENT_XRPL_ADDRESS: ${{ secrets.AGENT_XRPL_ADDRESS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_ONCE: "true"
        run: python agent/sml_agent.py
