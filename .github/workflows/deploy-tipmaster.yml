name: Deploy TipMaster to Render (one-shot)

on:
  push:
    branches: ['claude/flag-pattern-detection-mql5-f55fl']
    paths: ['.github/workflows/deploy-tipmaster.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: rnd_HwBcJWniVQM1oJI4R310AZeFqahJ
    steps:
      - name: Get Render owner ID
        id: owner
        run: |
          OWNER=$(curl -sf "https://api.render.com/v1/owners?limit=1" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['owner']['id'])")
          echo "id=$OWNER" >> $GITHUB_OUTPUT
          echo "Owner ID: $OWNER"

      - name: Check if tipmaster service already exists
        id: check
        run: |
          EXISTS=$(curl -sf "https://api.render.com/v1/services?limit=50" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            | python3 -c "
          import sys, json
          services = json.load(sys.stdin)
          names = [s['service']['name'] for s in services]
          print('true' if 'tipmaster' in names else 'false')
          ")
          echo "exists=$EXISTS" >> $GITHUB_OUTPUT
          echo "Service exists: $EXISTS"

      - name: Create TipMaster service on Render
        id: create
        if: steps.check.outputs.exists == 'false'
        run: |
          OWNER_ID="${{ steps.owner.outputs.id }}"
          RESPONSE=$(curl -sf -X POST "https://api.render.com/v1/services" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": \"web_service\",
              \"name\": \"tipmaster\",
              \"ownerId\": \"$OWNER_ID\",
              \"repo\": \"https://github.com/Timwal78/SqueezeOS\",
              \"branch\": \"main\",
              \"rootDir\": \"tipmaster\",
              \"serviceDetails\": {
                \"env\": \"docker\",
                \"dockerfilePath\": \"./Dockerfile\",
                \"healthCheckPath\": \"/health\",
                \"plan\": \"free\",
                \"region\": \"oregon\"
              },
              \"envVars\": [
                {\"key\": \"PORT\", \"value\": \"8080\"},
                {\"key\": \"XRPL_RPC_URL\", \"value\": \"https://xrplcluster.com\"},
                {\"key\": \"PROOF402_BASE_URL\", \"value\": \"https://four02proof.onrender.com\"},
                {\"key\": \"TIPMASTER_DB_PATH\", \"value\": \"/data/tipmaster.db\"}
              ]
            }")
          echo "$RESPONSE" | python3 -m json.tool
          SERVICE_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['service']['id'])")
          SERVICE_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; s=json.load(sys.stdin)['service']; print(s.get('serviceDetails',{}).get('url','pending'))")
          echo "service_id=$SERVICE_ID" >> $GITHUB_OUTPUT
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "Created service: $SERVICE_ID"

      - name: Get existing service ID
        id: existing
        if: steps.check.outputs.exists == 'true'
        run: |
          SERVICE_ID=$(curl -sf "https://api.render.com/v1/services?limit=50" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            | python3 -c "
          import sys, json
          services = json.load(sys.stdin)
          for s in services:
            if s['service']['name'] == 'tipmaster':
              print(s['service']['id'])
              break
          ")
          echo "service_id=$SERVICE_ID" >> $GITHUB_OUTPUT
          echo "Existing service: $SERVICE_ID"

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.exists }}" == "true" ]; then
            echo "✅ TipMaster service already exists: ${{ steps.existing.outputs.service_id }}"
          else
            echo "🚀 TipMaster service created!"
            echo "Service ID: ${{ steps.create.outputs.service_id }}"
            echo "URL: https://tipmaster.onrender.com"
            echo ""
            echo "Still needs these env vars set in Render dashboard:"
            echo "  NEYNAR_API_KEY"
            echo "  NEYNAR_WEBHOOK_SECRET"
            echo "  NEYNAR_BOT_SIGNER_UUID"
            echo "  TIPMASTER_BOT_FID"
            echo "  TIPMASTER_XRPL_SEED"
            echo "  TIPMASTER_XRPL_ADDRESS"
            echo "  TIPMASTER_TREASURY_ADDRESS"
          fi
