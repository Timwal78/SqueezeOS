name: Ops Sentinel — autonomous operational-drift fixer

# Operator mandate (2026-07-24): full autonomy for OPERATIONAL fixes, no
# human approval gate. See scripts/ops_sentinel.py's module docstring for
# the "no guessing or assuming" rule this script enforces on itself, and
# for exactly what is and isn't in scope (money/credentials are explicitly
# OUT of scope — this workflow never touches Stripe, AWS, or wallet config).
#
# Runs every 6 hours. If ops_sentinel.py mechanically confirms a fix against
# a concrete source of truth in this repo (tool count vs. mcp_bp.py's real
# _TOOLS list, version string vs. _SERVER_INFO), it applies it and pushes
# directly to main — no PR, no review, by design. Anything the script can't
# establish with certainty (broken links with no obvious correct target,
# ambiguous tool-count mentions) is flagged to the public marketing activity
# feed instead of guessed at.

on:
  schedule:
    - cron: '40 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sentinel:
    name: Run Ops Sentinel and auto-push fixes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Run Ops Sentinel
        env:
          MARKETING_ACTIVITY_SECRET: ${{ secrets.MARKETING_ACTIVITY_SECRET }}
        run: python3 scripts/ops_sentinel.py

      - name: Commit and push fixes (if any)
        run: |
          git config user.name "ops-sentinel[bot]"
          git config user.email "ops-sentinel@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes — nothing to push."
            exit 0
          fi
          git add -A
          git commit \
            -m "chore(ops-sentinel): auto-fix operational drift" \
            -m "Applied by scripts/ops_sentinel.py - every fix here is a mechanical correction verified against a concrete source of truth in this repo (no-guessing rule in the script's module docstring). No human review gate by explicit operator mandate; anything the script could not verify with certainty was flagged to the marketing activity feed instead of applied here."
          git push
