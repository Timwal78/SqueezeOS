name: Post-Deploy Health Check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BASE_URL: https://squeezeos-api.onrender.com
      MAX_WAIT_SECONDS: "720"
      RETRY_INTERVAL: "15"
    steps:
      - name: Wait for /api/status to be healthy
        run: |
          deadline=$(( $(date +%s) + MAX_WAIT_SECONDS ))
          attempt=0
          while :; do
            attempt=$((attempt + 1))
            body_file=$(mktemp)
            http_code=$(curl -s -o "$body_file" -w "%{http_code}" --max-time 60 "$BASE_URL/api/status")
            curl_exit=$?
            body=$(cat "$body_file")
            echo "attempt=$attempt curl_exit=$curl_exit http_status=$http_code"

            if [ "$curl_exit" -eq 0 ] && [ "$http_code" = "200" ]; then
              echo "$body" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data.get('status') == 'online', f'Expected online, got: {data}'
          print(f'  OK  status=online  uptime={data.get(\"uptime\")}s  version={data.get(\"version\")}')
          "
              exit 0
            fi

            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "FAIL: /api/status never returned 200 within ${MAX_WAIT_SECONDS}s"
              echo "Last http_status: $http_code  curl_exit: $curl_exit"
              echo "Last body: $body"
              exit 1
            fi

            sleep "$RETRY_INTERVAL"
          done

      - name: Check MCP endpoint
        run: |
          body_file=$(mktemp)
          http_code=$(curl -s -o "$body_file" -w "%{http_code}" --max-time 60 -X POST \
            "$BASE_URL/mcp" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"ping","params":{}}')
          body=$(cat "$body_file")
          echo "http_status=$http_code body=$body"
          if [ "$http_code" != "200" ]; then
            echo "FAIL: MCP ping returned $http_code"
            exit 1
          fi
          echo "$body" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'result' in data, f'No result in MCP ping response: {data}'
          print('  OK  MCP ping responded')
          "

      - name: Check free demo endpoint
        run: |
          body_file=$(mktemp)
          http_code=$(curl -s -o "$body_file" -w "%{http_code}" --max-time 60 \
            "$BASE_URL/api/demo/council")
          body_preview=$(head -c 500 "$body_file")
          echo "http_status=$http_code body_preview=$body_preview"
          if [ "$http_code" != "200" ]; then
            echo "FAIL: /api/demo/council returned $http_code"
            exit 1
          fi
          echo "  OK  /api/demo/council reachable"
