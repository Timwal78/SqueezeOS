name: xdeo-web-ci

on:
  push:
    branches: ["**"]
    paths: ["xdeo/web/**"]
  pull_request:
    paths: ["xdeo/web/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xdeo/web
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: xdeo/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
