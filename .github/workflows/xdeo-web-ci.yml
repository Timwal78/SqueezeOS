name: xdeo-web-ci

on:
  push:
    branches: ["**"]
    paths: ["xdeo/web/**"]
  pull_request:
    paths: ["xdeo/web/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xdeo/web
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: xdeo/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
