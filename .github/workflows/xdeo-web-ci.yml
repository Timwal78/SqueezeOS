name: xdeo-web-ci

on:
  push:
    branches: ["**"]
    paths: ["xdeo/web/**"]
  pull_request:
    paths: ["xdeo/web/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xdeo/web
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: xdeo/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
