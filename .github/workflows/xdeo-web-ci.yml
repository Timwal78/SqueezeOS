name: xdeo-web-ci

on:
  push:
    branches: ["**"]
    paths: ["xdeo/web/**"]
  pull_request:
    paths: ["xdeo/web/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xdeo/web
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@cdca7d6dd16c72fb5d9c5b2d47aaddfca8fd94e2 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: xdeo/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
