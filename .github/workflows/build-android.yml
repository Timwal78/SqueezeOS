name: Build Neural_OS AAB

on:
  push:
    branches: [claude/google-stitch-integration-LR0Y0, main]
    paths: [mobile/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@cdca7d6dd16c72fb5d9c5b2d47aaddfca8fd94e2 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@7a40b8b20c7b26c7e8a6c6fc36f62f01b9a74c45 # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@d155f4e6b6ac79ae9f5b7873f72a649e5bb02db0 # v4

      - name: Install dependencies
        run: npm ci

      - name: Build Vite bundle
        run: npm run build
        env:
          VITE_WC_PROJECT_ID: ${{ secrets.VITE_WC_PROJECT_ID }}
          VITE_ALCHEMY_KEY: ${{ secrets.VITE_ALCHEMY_KEY }}
          VITE_STRIPE_PK: ${{ secrets.VITE_STRIPE_PK }}
          VITE_BILLING_WALLET: ${{ secrets.VITE_BILLING_WALLET }}

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Patch version from package.json
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          MAJOR=$(echo $PKG_VER | cut -d. -f1)
          MINOR=$(echo $PKG_VER | cut -d. -f2)
          PATCH=$(echo $PKG_VER | cut -d. -f3)
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$PKG_VER\"/" android/app/build.gradle
          echo "versionCode=$VERSION_CODE versionName=$PKG_VER"

      - name: Build signed release AAB
        run: |
          KS_PATH="$GITHUB_WORKSPACE/mobile/neural-os.keystore"
          KS_PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          cd android && ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$KS_PATH" \
            -Pandroid.injected.signing.store.password="$KS_PASS" \
            -Pandroid.injected.signing.key.alias="neural-os-upload" \
            -Pandroid.injected.signing.key.password="$KS_PASS"

      - name: Build signed release APK
        run: |
          KS_PATH="$GITHUB_WORKSPACE/mobile/neural-os.keystore"
          KS_PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          cd android && ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$KS_PATH" \
            -Pandroid.injected.signing.store.password="$KS_PASS" \
            -Pandroid.injected.signing.key.alias="neural-os-upload" \
            -Pandroid.injected.signing.key.password="$KS_PASS"

      - name: Upload signed AAB
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: neural-os-${{ github.run_number }}-release.aab
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload signed APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: neural-os-${{ github.run_number }}-release.apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
