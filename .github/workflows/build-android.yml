name: Build Neural_OS AAB

on:
  push:
    branches: [claude/google-stitch-integration-LR0Y0, main]
    paths: [mobile/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build Vite bundle
        run: npm run build
        env:
          VITE_WC_PROJECT_ID: ${{ secrets.VITE_WC_PROJECT_ID }}
          VITE_ALCHEMY_KEY: ${{ secrets.VITE_ALCHEMY_KEY }}
          VITE_STRIPE_PK: ${{ secrets.VITE_STRIPE_PK }}
          VITE_BILLING_WALLET: ${{ secrets.VITE_BILLING_WALLET }}

      - name: Add Android platform (skip if already present)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already in repo, skipping add"
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Keystore: use stored secret or auto-generate one ───────────────────
      - name: Prepare keystore
        run: |
          KS_PATH="$GITHUB_WORKSPACE/mobile/neural-os-upload.jks"
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using stored keystore from secret"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$KS_PATH"
            KS_PASS="${{ secrets.KEYSTORE_PASSWORD }}"
            KS_ALIAS="${{ secrets.KEY_ALIAS }}"
            KEY_PASS="${{ secrets.KEY_PASSWORD }}"
          else
            echo "No keystore secret found — generating a new one"
            KS_PASS="neuralOS_$(openssl rand -hex 8)"
            KS_ALIAS="neural-os-upload"
            KEY_PASS="$KS_PASS"
            keytool -genkeypair -v \
              -keystore "$KS_PATH" \
              -alias "$KS_ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KS_PASS" -keypass "$KEY_PASS" \
              -dname "CN=Neural_OS,OU=ScriptMasterLabs,O=ScriptMasterLabs,L=US,ST=US,C=US"
            echo "KEYSTORE_AUTO_GENERATED=true" >> $GITHUB_ENV
            echo "KS_PASS=$KS_PASS" >> $GITHUB_ENV
            echo "KS_ALIAS=$KS_ALIAS" >> $GITHUB_ENV
          fi
          echo "KS_PATH=$KS_PATH" >> $GITHUB_ENV
          echo "KS_PASS_FINAL=${KS_PASS:-${{ secrets.KEYSTORE_PASSWORD }}}" >> $GITHUB_ENV
          echo "KS_ALIAS_FINAL=${KS_ALIAS:-${{ secrets.KEY_ALIAS }}}" >> $GITHUB_ENV
          echo "KEY_PASS_FINAL=${KEY_PASS:-${{ secrets.KEY_PASSWORD }}}" >> $GITHUB_ENV

      - name: Build signed release AAB
        run: |
          cd android && ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$KS_PATH" \
            -Pandroid.injected.signing.store.password="$KS_PASS_FINAL" \
            -Pandroid.injected.signing.key.alias="$KS_ALIAS_FINAL" \
            -Pandroid.injected.signing.key.password="$KEY_PASS_FINAL"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: neural-os-release-${{ github.run_number }}
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      # Upload the auto-generated keystore so you can save it for future builds
      - name: Upload keystore (SAVE THIS — needed for future updates)
        if: ${{ env.KEYSTORE_AUTO_GENERATED == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: SAVE-THIS-neural-os-keystore-${{ github.run_number }}
          path: mobile/neural-os-upload.jks
          retention-days: 90
