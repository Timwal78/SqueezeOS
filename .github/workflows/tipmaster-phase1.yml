name: TipMaster Phase 1 — Create Bot Signer (DELETE AFTER USE)

# Run this FIRST. Prints an approval URL — tap it in Warpcast, then run Phase 2.

on:
  workflow_dispatch:

jobs:
  create-signer:
    name: Create Neynar managed signer
    runs-on: ubuntu-latest

    env:
      NK: '5E46E636-CC5C-4D02-AF62-042269DEC9B8'

    steps:
      - name: Mask API key
        run: echo "::add-mask::$NK"

      - name: Verify Neynar API key
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.neynar.com/v2/farcaster/user?fid=3" \
            -H "x-api-key: $NK")
          echo "Neynar key check → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Neynar API key is invalid (HTTP $STATUS)"
            curl -s "https://api.neynar.com/v2/farcaster/user?fid=3" -H "x-api-key: $NK"
            exit 1
          fi
          echo "API key valid"

      - name: Create Neynar managed signer
        id: signer
        run: |
          RESP=$(curl -s -w "\nHTTP:%{http_code}" \
            -X POST "https://api.neynar.com/v2/farcaster/signer" \
            -H "x-api-key: $NK" \
            -H "Content-Type: application/json" \
            -d '{}')
          HTTP=$(echo "$RESP" | grep "HTTP:" | cut -d: -f2)
          BODY=$(echo "$RESP" | sed '/HTTP:/d')
          echo "HTTP $HTTP"
          echo "Body: $BODY"
          if [ "$HTTP" != "200" ]; then
            echo "ERROR: signer creation failed"
            exit 1
          fi
          SIGNER_UUID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('signer_uuid',''))")
          APPROVAL_URL=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('signer_approval_url',''))")
          if [ -z "$SIGNER_UUID" ]; then
            echo "ERROR: no signer_uuid in response"
            exit 1
          fi
          echo "::add-mask::$SIGNER_UUID"
          echo "signer_uuid=$SIGNER_UUID" >> "$GITHUB_OUTPUT"
          echo "approval_url=$APPROVAL_URL" >> "$GITHUB_OUTPUT"
          echo ""
          echo "======================================================"
          echo "  TAP THIS IN WARPCAST:"
          echo "  $APPROVAL_URL"
          echo ""
          echo "  SIGNER UUID (for Phase 2 input):"
          echo "  $SIGNER_UUID"
          echo "======================================================"
          echo "APPROVAL_URL=$APPROVAL_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "SIGNER_UUID=$SIGNER_UUID" >> "$GITHUB_STEP_SUMMARY"

      - name: Save to artifact
        run: |
          mkdir -p /tmp/tipmaster-signer
          echo "${{ steps.signer.outputs.signer_uuid }}" > /tmp/tipmaster-signer/signer_uuid.txt
          echo "${{ steps.signer.outputs.approval_url }}" > /tmp/tipmaster-signer/approval_url.txt

      - uses: actions/upload-artifact@v4
        with:
          name: tipmaster-signer
          path: /tmp/tipmaster-signer/
          retention-days: 7
