name: TipMaster Phase 1 â€” Create Bot Signer (DELETE AFTER USE)

# Run this FIRST.
# It creates a Farcaster bot signer and prints an approval URL.
# You have unlimited time to tap the URL in Warpcast before running Phase 2.

on:
  workflow_dispatch:

jobs:
  create-signer:
    name: Create Neynar managed signer
    runs-on: ubuntu-latest

    env:
      NK: '5E46E636-CC5C-4D02-AF62-042269DEC9B8'

    steps:
      - name: Mask API key
        run: echo "::add-mask::$NK"

      - name: Verify Neynar API key (fetch a public user)
        id: verify
        run: |
          echo "Testing Neynar API key..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.neynar.com/v2/farcaster/user?fid=3" \
            -H "x-api-key: $NK")
          echo "Neynar API key check â†’ HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Neynar API key invalid or Neynar is down (HTTP $STATUS)"
            echo "Full error response:"
            curl -s "https://api.neynar.com/v2/farcaster/user?fid=3" \
              -H "x-api-key: $NK"
            exit 1
          fi
          echo "API key is valid âœ“"

      - name: Create Neynar managed signer
        id: signer
        run: |
          echo "Creating managed signer..."
          RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "https://api.neynar.com/v2/farcaster/signer" \
            -H "x-api-key: $NK" \
            -H "Content-Type: application/json" \
            -d '{}')

          HTTP_STATUS=$(echo "$RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESP" | sed '/HTTP_STATUS:/d')

          echo "HTTP status: $HTTP_STATUS"
          echo "Response body: $BODY"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Signer creation failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          SIGNER_UUID=$(echo "$BODY" | python3 -c "
import sys, json
d = json.load(sys.stdin)
print(d.get('signer_uuid', ''))
" 2>/dev/null)

          APPROVAL_URL=$(echo "$BODY" | python3 -c "
import sys, json
d = json.load(sys.stdin)
print(d.get('signer_approval_url', ''))
" 2>/dev/null)

          if [ -z "$SIGNER_UUID" ]; then
            echo "ERROR: No signer_uuid in response. Full response:"
            echo "$BODY"
            exit 1
          fi

          echo "::add-mask::$SIGNER_UUID"
          echo "signer_uuid=$SIGNER_UUID" >> "$GITHUB_OUTPUT"
          echo "approval_url=$APPROVAL_URL" >> "$GITHUB_OUTPUT"

          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
## âš¡ TipMaster Bot â€” Action Required

### 1 â€” Approve the bot signer in Warpcast
Tap this link on your phone:

**[ðŸ‘‰ TAP HERE TO APPROVE THE BOT]($APPROVAL_URL)**

Direct URL (copy if link doesn't work):
\`\`\`
$APPROVAL_URL
\`\`\`

### 2 â€” Copy the Signer UUID for Phase 2
\`\`\`
$SIGNER_UUID
\`\`\`

Take as long as you need â€” Phase 2 can run any time after you tap the link.
SUMMARY

          echo ""
          echo "============================================================"
          echo "  APPROVAL URL â€” tap this in Warpcast:"
          echo "  $APPROVAL_URL"
          echo ""
          echo "  SIGNER UUID â€” paste into Phase 2:"
          echo "  $SIGNER_UUID"
          echo "============================================================"

      - name: Save to artifact
        run: |
          mkdir -p /tmp/tipmaster-signer
          echo "${{ steps.signer.outputs.signer_uuid }}" > /tmp/tipmaster-signer/signer_uuid.txt
          echo "${{ steps.signer.outputs.approval_url }}" > /tmp/tipmaster-signer/approval_url.txt

      - uses: actions/upload-artifact@v4
        with:
          name: tipmaster-signer
          path: /tmp/tipmaster-signer/
          retention-days: 7
