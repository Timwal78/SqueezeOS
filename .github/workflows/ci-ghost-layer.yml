name: CI — ghost-layer

on:
  push:
    paths:
      - "ghost-layer/**"
  pull_request:
    paths:
      - "ghost-layer/**"

jobs:
  build:
    name: Go build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ghost-layer/go.sum

      - name: Build
        run: go build ./...
        working-directory: ghost-layer

  test:
    name: Go test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ghost-layer/go.sum

      - name: Test
        run: go test ./...
        working-directory: ghost-layer
