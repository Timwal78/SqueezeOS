name = "xdeo"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "de174553560f13ed28ab35f8fc160215"

# Static assets (llms.txt, openapi, etc.) served from ./public
[assets]
directory = "./public"
binding = "ASSETS"

# Relational store — analysts, estimates, tickers, filings, verdicts, agents
[[d1_databases]]
binding = "DB"
database_name = "xdeo"
database_id = "87531ee2-9c6b-48bf-aa6a-01737f534915"
migrations_dir = "migrations"

# Cache + ephemeral state (rate limits, EDGAR ETags, dedupe)
[[kv_namespaces]]
binding = "KV"
id = "e8879156f30a4b8bb398b50a56abbc55"

# Real-time stream fan-out (WebSocket + SSE) — single global instance.
[[durable_objects.bindings]]
name = "STREAM_HUB"
class_name = "StreamHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["StreamHub"]

# Workers AI — inference binding; no external key. Billed to CF account.
# Powers the AI thesis endpoint (GET /api/v1/estimates/:id/ai-thesis, $0.75 USDC).
[ai]
binding = "AI"

# Crons:
#   */5 * * * *      — pull new SEC filings + score open estimates (ingestion pipeline)
#   0 13 * * 1-5     — weekday 13:00 UTC: autonomous House Analyst seeds EPS forecasts
[triggers]
crons = ["*/5 * * * *", "0 13 * * 1-5"]

[vars]
# --- Identity (SEC requires a descriptive User-Agent on every request) ---
EDGAR_USER_AGENT = "xDEO Earnings Oracle contact@example.com"
# --- x402 / payments (USDC on Base mainnet) ---
X402_NETWORK = "base"
# USDC on Base mainnet
X402_ASSET = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
X402_FACILITATOR_URL = "https://x402.org/facilitator"
PROTOCOL_FEE_BPS = "500"            # 5% protocol fee (analysts keep 95%)
AGENT_AFFILIATE_BPS = "1500"        # 15% to referring AI agents
TREASURY_BPS = "500"                # 5% to community treasury
# --- Autonomous House Analyst (daily cron) ---
# Watchlist of companies the House AI forecasts. Real symbols; data is from EDGAR.
XDEO_UNIVERSE = "AAPL,MSFT,NVDA,AMZN,GOOGL,META,TSLA,AMD,NFLX,AVGO,JPM,V,WMT,COST,PLTR"
HOUSE_ESTIMATE_PRICE = "0.05"       # USDC to read a house thesis
HOUSE_MAX_PER_RUN = "5"             # per-run cap (free-plan subrequest safe; raise on paid)
# HOUSE_ANALYST_ADDRESS is optional; defaults to a labelled house identity.
# ADMIN_TOKEN is a secret (set via deploy from the XDEO_ADMIN_TOKEN GitHub secret).
# X402_PAY_TO and X402_DEV_BYPASS_TOKEN are secrets — set via `wrangler secret put`

# Production secrets (set out-of-band, never commit):
#   wrangler secret put X402_PAY_TO              # protocol receiving wallet (Base)
#   wrangler secret put X402_DEV_BYPASS_TOKEN    # optional: local/dev test bypass
