<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SqueezeOS — Schwab Auth Callback</title>
</head>
<body style="background:#0f172a;color:#38bdf8;font-family:system-ui,monospace;
             display:flex;align-items:center;justify-content:center;
             min-height:100vh;margin:0;padding:16px;">
<div style="text-align:center;border:1px solid #0ea5e9;padding:24px;
            border-radius:8px;background:rgba(0,0,0,0.4);max-width:560px;width:100%;">
    <h2 style="margin-top:0;">📡 OAUTH BRIDGE</h2>
    <div id="status">Capturing authorization code…</div>
    <div id="code-box" style="display:none;margin-top:16px;">
        <div style="font-size:12px;color:#94a3b8;margin-bottom:6px;">CODE</div>
        <textarea id="code-text" readonly style="width:100%;height:60px;
            background:#000;color:#0f0;border:1px solid #334155;font-size:11px;
            font-family:monospace;padding:8px;border-radius:6px;"></textarea>
        <div style="margin-top:10px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
            <button onclick="copyCode()" style="background:#0ea5e9;color:#fff;
                border:0;padding:8px 14px;border-radius:6px;cursor:pointer;">📋 Copy</button>
            <button onclick="exchangeNow()" style="background:#10b981;color:#fff;
                border:0;padding:8px 14px;border-radius:6px;cursor:pointer;">⚡ Exchange now</button>
        </div>
        <div id="exchange-result" style="margin-top:12px;font-size:13px;"></div>
        <p style="margin-top:18px;color:#94a3b8;font-size:12px;">
            If neither button works, paste the code into the manual form at
            <a href="/oauth/manual" style="color:#38bdf8;">/oauth/manual</a>.
        </p>
    </div>
</div>

<script>
(function() {
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const statusEl = document.getElementById('status');
    const codeBox  = document.getElementById('code-box');
    const codeText = document.getElementById('code-text');

    if (!code) {
        statusEl.textContent = '🛑 NO CODE FOUND IN URL.';
        statusEl.style.color = '#f87171';
        return;
    }

    codeText.value = code;
    codeBox.style.display = 'block';

    // Best-effort: send to opener (legacy popup flow)
    if (window.opener && !window.opener.closed) {
        try {
            window.opener.postMessage({type:'SCHWAB_AUTH_CODE', code:code}, '*');
            statusEl.textContent = '✅ CODE SENT TO PARENT WINDOW';
            setTimeout(() => { try { window.close(); } catch(e){} }, 2500);
            return;
        } catch (e) { /* fall through to manual paths */ }
    }
    statusEl.innerHTML = '⚠ NO PARENT WINDOW DETECTED — use the buttons below ↓';
    statusEl.style.color = '#fbbf24';
})();

function copyCode() {
    const t = document.getElementById('code-text');
    t.select();
    try {
        navigator.clipboard.writeText(t.value);
        document.getElementById('exchange-result').innerHTML =
            '<span style="color:#10b981">✓ copied — paste into /oauth/manual</span>';
    } catch (e) {
        document.execCommand('copy');
    }
}

async function exchangeNow() {
    const code = document.getElementById('code-text').value.trim();
    const result = document.getElementById('exchange-result');
    result.innerHTML = '⏳ exchanging…';
    try {
        const r = await fetch('/api/auth/exchange', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({code: code})
        });
        const d = await r.json();
        if (d.status === 'success') {
            result.innerHTML = '<span style="color:#10b981">✅ tokens saved — you can close this tab</span>';
        } else {
            result.innerHTML = '<span style="color:#f87171">❌ ' +
                (d.message || JSON.stringify(d)) + '</span>';
        }
    } catch (e) {
        result.innerHTML = '<span style="color:#f87171">❌ ' + e.message + '</span>';
    }
}
</script>
</body>
</html>
