<body class="bg-background text-on-background overflow-hidden h-screen w-screen flex flex-col justify-center items-center">

<main class="relative z-10 flex flex-col items-center justify-center w-full max-w-lg px-margin-mobile">
<div class="mb-xl flex flex-col items-center group">
<div class="relative w-32 h-32 mb-md flex items-center justify-center">
<div class="absolute inset-0 border-2 border-primary-fixed-dim/30 rounded-full animate-[spin_10s_linear_infinite]"></div>
<div class="absolute inset-2 border border-primary-fixed-dim/50 rounded-full animate-[spin_6s_linear_reverse_infinite]"></div>

</div>
<h1 class="font-display-lg text-headline-lg-mobile md:text-display-lg tracking-tighter text-primary-fixed-dim glow-cyan">NEURAL_OS</h1>
<div class="h-[1px] w-12 bg-gradient-to-r from-transparent via-primary-fixed-dim to-transparent mt-2"></div>
</div>
<div class="w-full space-y-md">
<div class="flex justify-between items-end mb-xs">
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-primary-fixed-dim tracking-widest uppercase">Initializing Protocol</span>
<span class="font-label-sm text-[10px] text-outline mt-1 uppercase" id="current-task">Loading sub-routine: 0x4A2...</span>
</div>
<div class="flex flex-col items-end">
<span class="font-label-sm text-label-sm text-primary-fixed-dim" id="percentage">00.00%</span>
<span class="font-label-sm text-[10px] text-outline" id="ms-counter">00:00:00:000</span>
</div>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden border border-white/5 relative">
<div class="h-full bg-primary-fixed-dim w-0 transition-all duration-300 ease-out glow-box-cyan relative" id="progress-fill">
<div class="absolute top-0 right-0 h-full w-4 bg-white/40 blur-sm"></div>
</div>
</div>
<div class="font-label-sm text-[10px] text-outline/40 flex justify-center gap-2 overflow-hidden h-4" id="hex-ticker">
<span>0xAF42</span><span>0x992B</span><span>0xCC11</span><span>0xDE02</span><span>0x8871</span><span>0x00A1</span>
</div>
</div>
</main>
<footer class="fixed bottom-lg w-full px-margin-mobile flex flex-col items-center space-y-xs z-20">
<div class="h-[1px] w-32 bg-white/10 mb-md"></div>
<p class="font-display-lg text-label-sm tracking-[0.2em] text-on-surface/60 font-light">INSTITUTIONAL RWA PROTOCOL</p>
<div class="flex items-center space-x-md">
<span class="font-label-sm text-[10px] text-outline tracking-widest">SECURED BY X402</span>
<div class="w-1 h-1 bg-tertiary-container rounded-full animate-pulse"></div>
<span class="font-label-sm text-[10px] text-outline tracking-widest">AIXBT ENABLED</span>
</div>
</footer>
<script>
        let progress = 0;
        const progressFill = document.getElementById('progress-fill');
        const percentageText = document.getElementById('percentage');
        const taskText = document.getElementById('current-task');
        const msCounter = document.getElementById('ms-counter');
        const hexTicker = document.getElementById('hex-ticker');

        const tasks = [
            "Synchronizing Neural Nodes...",
            "Validating On-Chain Identity...",
            "Encrypting Session Keys...",
            "Calibrating RWA Oracle...",
            "Optimizing Data Streams...",
            "Finalizing Handshake..."
        ];

        function updateProgress() {
            if (progress < 100) {
                const inc = Math.random() * 0.8;
                progress += inc;
                if (progress > 100) progress = 100;
                progressFill.style.width = `${progress}%`;
                percentageText.innerText = `${progress.toFixed(2)}%`;
                const taskIdx = Math.floor((progress / 100) * tasks.length);
                if (tasks[taskIdx]) taskText.innerText = `Sub-routine: ${tasks[taskIdx]}`;
                const now = new Date();
                const ms = String(now.getMilliseconds()).padStart(3, '0');
                const sec = String(now.getSeconds()).padStart(2, '0');
                const min = String(now.getMinutes()).padStart(2, '0');
                msCounter.innerText = `00:${min}:${sec}:${ms}`;
                if (Math.random() > 0.8) {
                    const spans = hexTicker.querySelectorAll('span');
                    const randomIdx = Math.floor(Math.random() * spans.length);
                    spans[randomIdx].innerText = '0x' + Math.floor(Math.random()*65536).toString(16).toUpperCase().padStart(4, '0');
                }
                requestAnimationFrame(updateProgress);
            } else {
                taskText.innerText = "PROTOCOL READY";
                taskText.classList.add('text-tertiary-container');
                percentageText.innerText = "100.00%";
                setTimeout(() => { window.location.href = 'discover.html'; }, 1200);
            }
        }

        const streamContainer = document.getElementById('hex-stream-container');
        for (let i = 0; i < 15; i++) {
            const stream = document.createElement('div');
            stream.className = 'animate-marquee flex whitespace-nowrap opacity-20';
            let content = '';
            for (let j = 0; j < 50; j++) {
                content += '0x' + Math.floor(Math.random()*16777215).toString(16).toUpperCase() + '   ';
            }
            stream.innerHTML = `<span class="data-stream">${content}</span><span class="data-stream">${content}</span>`;
            stream.style.animationDuration = (20 + Math.random() * 40) + 's';
            stream.style.animationDirection = Math.random() > 0.5 ? 'normal' : 'reverse';
            streamContainer.appendChild(stream);
        }

        setTimeout(updateProgress, 500);
    </script>
