services:
  - type: web
    name: tipmaster
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: NEYNAR_API_KEY
        sync: false
      - key: NEYNAR_WEBHOOK_SECRET
        sync: false
      - key: NEYNAR_BOT_SIGNER_UUID
        sync: false
      - key: TIPMASTER_BOT_FID
        sync: false
      - key: TIPMASTER_XRPL_SEED
        sync: false
      - key: TIPMASTER_XRPL_ADDRESS
        sync: false
      - key: TIPMASTER_DB_PATH
        value: /data/tipmaster.db
      - key: TIPMASTER_TREASURY_ADDRESS
        sync: false
      # Safety gate — keep "false" until the deposit/custody flow lands.
      # When false, tipping commands respond with a maintenance message
      # and never invoke two_leg_tip (which would otherwise drain the bot
      # wallet because XRPL does not support delegated debits). All other
      # commands (register, balance, leaderboard, stats, help) work normally.
      - key: TIPMASTER_TIPS_ENABLED
        value: "false"
      - key: XRPL_RPC_URL
        value: https://xrplcluster.com
      - key: PROOF402_BASE_URL
        value: https://four02proof.onrender.com
    disk:
      name: tipmaster-data
      mountPath: /data
      sizeGB: 1
