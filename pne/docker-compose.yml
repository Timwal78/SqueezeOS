version: "3.9"

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8402:8402"
    environment:
      - PORT=8402
      - REDIS_URL=redis://redis:6379
      - UPSTREAM_BASE_URL=${UPSTREAM_BASE_URL:-https://lively-fascination-production-41fa.up.railway.app}
      - MACAROON_SECRET=${MACAROON_SECRET}
      - RATE_LIMIT_UNAUTH=100
      - AUCTION_WINDOW_MS=5
      - BASE_PRICE_SATS=100
      - PLATFORM_FEE_PCT=1.0
      - RUST_LOG=pne_gateway=info,tower_http=warn
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8402/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 3

  loom:
    build:
      context: ./loom
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_GATEWAY_WS=ws://localhost:8402
      - VITE_GATEWAY_HTTP=http://localhost:8402
    depends_on:
      - gateway
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=pne_audit
      - POSTGRES_USER=pne
      - POSTGRES_PASSWORD=${TIMESCALE_PASSWORD:-pne_dev_password}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./gateway/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pne -d pne_audit"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  timescale_data:
