# ============================================================
# Payment (x402 / RLUSD on XRPL)
# ============================================================

payment:
  required: true
  protocol: "x402"
  description: >
    Premium tools require per-call RLUSD payment on XRP Ledger mainnet.
    No API keys or subscriptions. Many endpoints are completely free (demo,
    preview, history, webhooks, marketplace browse, hiring). Full payment flow:
      1. Call premium tool → receive HTTP 402 with ERR_PAYMENT_REQUIRED + invoice
      2. Send RLUSD to invoice.pay_to on XRPL with invoice.memo_hex as MemoData
      3. POST https://four02proof.onrender.com/v1/verify → receive access_token (1h TTL)
      4. Retry with X-Payment-Token: <token> header
      5. Cache token for 1 hour — covers all calls to same endpoint within TTL
  gateway:
    url: "https://four02proof.onrender.com"
    standard: "x402"
    chain: "XRPL"
    network: "mainnet"
    asset: "RLUSD"
    asset_issuer: "rMxCKbEDwqr76QuheSUMdEGf4B9xJ8m5De"
    token_ttl_seconds: 3600
    token_header: "X-Payment-Token"
    wallet_header: "X-Agent-Wallet"
  error_codes:
    ERR_PAYMENT_REQUIRED: "No token — get invoice → pay → verify → retry"
    ERR_TOKEN_EXPIRED: "Token TTL elapsed — get a new invoice"
    ERR_TOKEN_INVALID: "Bad signature — re-obtain token"
    ERR_ENDPOINT_MISMATCH: "Token for different endpoint — new invoice for this path"
    ERR_WALLET_MISMATCH: "Token used from wrong wallet — pay from own wallet"
    ERR_SCORE_TOO_LOW: "Credit Bureau score insufficient — build score via payments"
  prerequisites:
    - "RLUSD trust line to issuer rMxCKbEDwqr76QuheSUMdEGf4B9xJ8m5De (limit >= 10 RLUSD)"
    - "Minimum XRPL wallet reserve: 2 XRP"
    - "Invoices expire ~10-15 min — request immediately before paying"
  loyalty:
    description: >
      Cumulative spend tracked per wallet. Free credits applied automatically.
      Diamond agents pay ~33% less on average.
    tiers:
      - name: "Bronze"
        threshold_rlusd: 0
        free_call_ratio: "none"
        effective_cost_multiplier: 1.000
      - name: "Silver"
        threshold_rlusd: 1
        free_call_ratio: "1:10"
        effective_cost_multiplier: 0.909
      - name: "Gold"
        threshold_rlusd: 5
        free_call_ratio: "1:5"
        effective_cost_multiplier: 0.833
      - name: "Platinum"
        threshold_rlusd: 25
        free_call_ratio: "1:3"
        effective_cost_multiplier: 0.750
      - name: "Diamond"
        threshold_rlusd: 100
        free_call_ratio: "1:2"
        effective_cost_multiplier: 0.667

# ============================================================
# Auth
# ============================================================

auth:
  type: "x402"
  description: >
    No API keys. Authentication is proof-of-payment via XRPL RLUSD transaction.
    Tokens are HMAC-SHA256 signed, verified locally (zero network latency).
    Tokens are wallet-bound — X-Agent-Wallet must match the paying wallet.
  headers:
    - name: "X-Payment-Token"
      description: "Signed access token from verify_payment. Required for premium tools."
      required: true
      applies_to: [council_verdict, market_scan, options_intelligence, iwm_odte, marketplace_read_signal, bureau_full_report]
    - name: "X-Agent-Wallet"
      description: "Your XRPL classic address. Recommended on all calls for loyalty attribution."
      required: false
      recommended: true

