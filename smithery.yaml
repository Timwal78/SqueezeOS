# ============================================================
# Operational notes
# ============================================================

operational_notes:
  - "SqueezeOS API is hosted on Railway (EU West). Persistent deployment — cold starts are uncommon."
  - "402Proof gateway is hosted on Render free tier. First request after >15 min idle may take 30–60 seconds. Implement exponential backoff: 2s, 4s, 8s, 16s."
  - "XRPL mainnet is used exclusively for payments. Testnet seeds are rejected by the production gateway."
  - "Tokens are wallet-bound. Never share your access token. Mismatched X-Agent-Wallet headers are rejected when ENFORCE_WALLET_BINDING=true is set server-side."
  - "RLUSD trust line is mandatory before the first payment: TrustSet currency=RLUSD issuer=rMxCKbEDwqr76QuheSUMdEGf4B9xJ8m5De limit=1000."
  - "Compliance receipts are generated for every verified payment and retrievable at https://four02proof.onrender.com/v1/receipt/{receipt_id}."

# ============================================================
# SDK and integration resources
# ============================================================

sdk:
  python:
    description: "Native Python SDK with automatic payment handling and disk-based token caching"
    dependencies: "pip install requests xrpl-py"
    file: "squeezeos_sdk.py"
    class: "SqueezeOSClient"
    quickstart: |
      from squeezeos_sdk import SqueezeOSClient
      client = SqueezeOSClient(
          xrpl_seed="sEd...",
          agent_domain="mybot.example.com"
      )
      # First call pays automatically, subsequent calls use the cached token
      verdict = client.council("IWM")
      scan    = client.scan()
      opts    = client.options("SPY")
      iwm     = client.iwm()
      loyalty = client.loyalty_status()
  demo:
    description: "Standalone step-by-step walkthrough with DEMO_MODE for evaluation without RLUSD"
    file: "agent_demo.py"
    run: "AGENT_XRPL_SEED=sEd... python agent_demo.py"
  openapi:
    url: "https://lively-fascination-production-41fa.up.railway.app/openapi.json"
  llms_txt:
    url: "https://lively-fascination-production-41fa.up.railway.app/llms.txt"
