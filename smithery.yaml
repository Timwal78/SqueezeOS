name: squeezeos-market-intelligence
display_name: "SqueezeOS Market Intelligence"
description: >
  Institutional-grade market intelligence for autonomous AI agents.
  Delivers real-time squeeze scanning, AI council verdicts, options flow
  analysis, and IWM zero-day-to-expiry scoring. Powered by the SML Fractal
  Cascade, Battle Computer, and Gamma Flow Engine. All premium endpoints are
  gated by the x402 RLUSD micropayment standard — agents pay per call on the
  XRPL with no API keys required. Loyalty tiers (Bronze → Diamond) reward
  cumulative spend with up to 33% effective cost reduction.
version: "2.0.0"
homepage: "https://www.scriptmasterlabs.com"
repository: "https://github.com/Timwal78/SqueezeOS"
