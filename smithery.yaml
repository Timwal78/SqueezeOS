name: squeezeos-market-intelligence
display_name: "SqueezeOS Market Intelligence"
description: |
  Institutional AI market intelligence for autonomous agents. Real-time squeeze
  signals, options flow analysis, AI council verdicts, and IWM 0DTE scanning.
  Pay-per-call with RLUSD on XRPL via HTTP 402 — no API keys, no subscriptions.
  Tokens are wallet-bound and issued via 402Proof compliance firewall.
version: "2.0.0"
homepage: "https://www.scriptmasterlabs.com"
repository: "https://github.com/Timwal78/SqueezeOS"
license: "Proprietary"
category: "finance"
tags:
  - finance
  - trading
  - options
  - market-intelligence
  - xrpl
  - micropayments
  - x402
  - ai-agents
  - squeeze
  - institutional

server:
  type: http
  url: "https://lively-fascination-production-41fa.up.railway.app"
  openapi: "https://lively-fascination-production-41fa.up.railway.app/.well-known/openapi.json"

payment:
  required: true
  protocol: x402
  gateway: "https://four02proof.onrender.com"
  asset: RLUSD
  network: XRPL
  issuer: "rMxCKbEDwqr76QuheSUMdEGf4B9xJ8m5De"
  flow:
    - step: "POST {gateway}/v1/invoice with endpoint_id"
    - step: "Send RLUSD on XRPL to pay_to with memo_hex as MemoData"
    - step: "POST {gateway}/v1/verify with invoice_id, tx_hash, agent_wallet"
    - step: "Use access_token in X-Payment-Token header"

tools:
  - name: council_verdict
    description: "AI Council Verdict — multi-engine signal aggregate (SML fractal cascade + Battle Computer). Returns market regime, bias (BULLISH/BEARISH/NEUTRAL), confidence 0-100, and actionable thesis for any ticker."
    cost: "0.10 RLUSD"
    endpoint_id: "12a0e7a1-6812-4c3f-aa24-de6e3bc12b5a"
    inputSchema:
      type: object
      properties:
        symbol:
          type: string
          description: "Ticker symbol (e.g. IWM, GME, MSTR)"
          default: "IWM"
      required: []

  - name: market_scan
    description: "Full $1-$50 universe market scan. Live squeeze signals, grade-A options picks, and technical scores across up to 250 symbols. Background-refreshed every 3 seconds."
    cost: "0.05 RLUSD"
    endpoint_id: "160cf28d-b364-44eb-adbd-2489c5cc2cf8"
    inputSchema:
      type: object
      properties: {}

  - name: options_intelligence
    description: "Options intelligence flow for any symbol. Institutional sweeps, whale detection, unusual volume, and scored contract recommendations with plain-English explanations."
    cost: "0.05 RLUSD"
    endpoint_id: "c951a374-2424-4064-ab80-35afe8053d29"
    inputSchema:
      type: object
      properties:
        symbol:
          type: string
          default: "IWM"

  - name: iwm_odte
    description: "IWM 0DTE institutional scanner. Scored contracts, parity watch, realized volatility, and delta/gamma analytics for Russell 2000 index options expiring today."
    cost: "0.03 RLUSD"
    endpoint_id: "60f48ce0-6002-4385-9b60-03a0d2bbebab"
    inputSchema:
      type: object
      properties: {}

  - name: get_invoice
    description: "Request a payment invoice from 402Proof for a specific endpoint. Free — no auth required."
    cost: "free"
    endpoint: "POST https://four02proof.onrender.com/v1/invoice"
    inputSchema:
      type: object
      properties:
        endpoint_id:
          type: string
          description: "UUID of the endpoint to pay for"
      required: [endpoint_id]

  - name: verify_payment
    description: "Submit XRPL transaction hash after paying an invoice. Returns wallet-bound access token (1-hour TTL) and compliance receipt."
    cost: "free"
    endpoint: "POST https://four02proof.onrender.com/v1/verify"
    inputSchema:
      type: object
      properties:
        invoice_id: {type: string}
        tx_hash: {type: string, description: "XRPL transaction hash"}
        agent_wallet: {type: string, description: "Your XRPL r-address"}
      required: [invoice_id, tx_hash, agent_wallet]

  - name: agent_passport
    description: "Get Agent Passport: loyalty tier, cumulative RLUSD spend, discount rate, KYB status. Bronze→Silver→Gold→Platinum→Diamond."
    cost: "free"
    endpoint: "GET https://four02proof.onrender.com/v1/agent/{wallet}"
    inputSchema:
      type: object
      properties:
        wallet: {type: string}
      required: [wallet]

  - name: live_events
    description: "Subscribe to live SSE event stream. Receives SQUEEZE_ALERT, OPTIONS_SWEEP, COUNCIL_VERDICT, AGENT_PROBE, AGENT_PAY events in real time. No auth required."
    cost: "free"
    endpoint: "GET https://lively-fascination-production-41fa.up.railway.app/api/events"
    inputSchema:
      type: object
      properties: {}
