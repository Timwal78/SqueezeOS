services:
  - type: web
    name: squeezeos-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: TRADIER_API_KEY
        sync: false
      - key: TRADIER_ENV
        value: production
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: DISCORD_WEBHOOK_ALL
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: PROOF402_TOKEN_SECRET
        sync: false
      - key: PROOF402_SERVER_URL
        value: https://four02proof.onrender.com
      - key: OWNER_API_KEY
        sync: false
      - key: PORT
        value: "8182"
      - key: REDIS_URL
        fromService:
          type: redis
          name: pne-redis
          property: connectionString
    healthCheckPath: /api/status
    autoDeploy: true

  # ---------------------------------------------------------------------------
  # pne-redis — Redis for the PNE sovereign intent auction gateway
  # ---------------------------------------------------------------------------
  - type: redis
    name: pne-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ---------------------------------------------------------------------------
  # pne-gateway — Signal Loom sovereign intent auction gateway (Rust/Axum)
  # L402 priority bidding over SqueezeOS API — formerly on Railway, now Render
  # ---------------------------------------------------------------------------
  - type: web
    name: pne-gateway
    env: docker
    dockerfilePath: ./pne/gateway/Dockerfile
    dockerContext: ./pne/gateway
    plan: starter
    healthCheckPath: /v1/status
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8402"
      - key: REDIS_URL
        fromService:
          type: redis
          name: pne-redis
          property: connectionString
      - key: UPSTREAM_BASE_URL
        value: "https://squeezeos-api.onrender.com"
      - key: MACAROON_SECRET
        sync: false
      - key: RATE_LIMIT_UNAUTH
        value: "100"
      - key: AUCTION_WINDOW_MS
        value: "5"
      - key: PLATFORM_FEE_PCT
        value: "1.0"
      - key: BASE_PRICE_SATS
        value: "100"
      - key: CORS_ORIGINS
        value: "https://signal-loom.vercel.app,https://n-exchequer.io"
