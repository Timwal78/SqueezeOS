services:
  - type: web
    name: ghost-layer-facilitator
    env: docker
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: ENVIRONMENT
        value: production
      - key: TREASURY_ADDRESS
        value: "rNduuviQ3CCvHqWUTjJDD82Ko2tjqFGs3q"
      - key: TREASURY_ETH_ADDRESS
        value: ""
      - key: BASE_RPC_URL
        value: "https://mainnet.base.org"
      - key: XRPL_RPC_URL
        value: "https://xrplcluster.com"
      - key: XAHAU_RPC_URL
        value: "https://xahau.network"
      - key: USDC_CONTRACT_ADDRESS
        value: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
      # ── Gateway signing keys (set in Render dashboard — never commit) ──────────
      # GATEWAY_XRPL_PRIVATE_KEY  : secp256k1 private key for XRPL payments
      # GATEWAY_XAHAU_PRIVATE_KEY : same key format for Xahau URITokenMint
      #   → if not set, falls back to GATEWAY_XRPL_PRIVATE_KEY automatically
      #   → the gateway wallet must hold XAH on Xahau network for tx fees
      - key: GATEWAY_XRPL_PRIVATE_KEY
        sync: false
      - key: GATEWAY_XAHAU_PRIVATE_KEY
        sync: false
      - key: GATEWAY_ETH_PRIVATE_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      # Live agent monitoring feed — SqueezeOS Railway SSE URL
      # Set to: https://lively-fascination-production-41fa.up.railway.app/api/events
      - key: SQUEEZEOS_SSE_URL
        value: "https://lively-fascination-production-41fa.up.railway.app/api/events"
