<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GHOST LAYER TERMINAL</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #terminal-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00FFCC;
            z-index: 10;
            pointer-events: none;
            user-select: none;
        }
        #terminal-overlay h1 {
            margin: 0 0 10px;
            font-size: 1.4rem;
            letter-spacing: 0.12em;
            text-shadow: 0 0 12px #00FFCC88;
        }
        .gl-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.72rem;
            opacity: 0.85;
            margin: 2px 0;
            letter-spacing: 0.05em;
        }
        .gl-label { color: #667788; text-transform: uppercase; min-width: 72px; }
        .gl-val   { color: #00FFCC; font-weight: bold; }
        #gl-status { font-size: 0.72rem; }
        .tach-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 3px;
            background: #111;
            border-radius: 2px;
            overflow: hidden;
        }
        .tach-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00FFCC, #AA00FF);
            transition: width 0.1s linear;
            box-shadow: 0 0 8px #00FFCC;
        }
    </style>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <link rel="alternate" type="text/plain" href="/llms.txt" title="LLM Discovery">
    <link rel="alternate" type="application/json" href="/.well-known/openapi.json" title="OpenAPI Spec">
    <meta name="description" content="Ghost Layer — dual-chain transparent toll gateway for autonomous AI agents. Bridge RLUSD (XRPL) and USDC (Base/EVM) micropayments with full compliance receipts.">
    <meta name="robots" content="index, follow">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Ghost Layer",
      "alternateName": "Ghost Layer Bridge",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "url": "https://ghost-layer.onrender.com",
      "description": "Dual-chain transparent toll gateway for autonomous AI agents. Bridges RLUSD payments on the XRP Ledger and USDC gasless authorization on Base (EIP-3009) with tamper-evident compliance receipts and Agent Passport loyalty tracking.",
      "featureList": [
        "XRPL RLUSD settlement — sub-5 second finality",
        "Base/EVM EIP-3009 gasless USDC authorization",
        "Agent Passport loyalty tiers — Bronze through Diamond",
        "Tamper-evident compliance receipts with XRPL or EVM tx hash",
        "Honeypot tarpit defense for unauthorized scanners",
        "HTTP 402 x402 payment protocol compliance",
        "Admin KYB tier management for institutional agents"
      ],
      "provider": {
        "@type": "Organization",
        "name": "Script Master Labs",
        "url": "https://www.scriptmasterlabs.com"
      },
      "offers": {
        "@type": "Offer",
        "price": "0.01",
        "priceCurrency": "RLUSD",
        "description": "Per-bridge micropayment — pricing varies by operation"
      }
    }
    </script>
</head>
<body>
    <div id="terminal-overlay">
        <h1>GHOST LAYER V2</h1>
        <div class="gl-row">
            <span class="gl-label">Stream</span>
            <span class="gl-val" id="gl-status">○ CONNECTING</span>
        </div>
        <div class="gl-row">
            <span class="gl-label">Bridges</span>
            <span class="gl-val" id="gl-count">–</span>
        </div>
        <div class="gl-row">
            <span class="gl-label">Chain</span>
            <span class="gl-val" id="gl-chain">–</span>
        </div>
        <div class="gl-row">
            <span class="gl-label">Last TX</span>
            <span class="gl-val" id="gl-tx">–</span>
        </div>
        <div class="gl-row">
            <span class="gl-label">Tach</span>
            <span class="gl-val" id="gl-speed">0%</span>
        </div>
    </div>
    <div class="tach-bar">
        <div class="tach-fill" id="tach-fill"></div>
    </div>
    <script type="module" src="js/cube.js"></script>
</body>
</html>
